name: Release macOS x86

on:
  workflow_dispatch

jobs:
  build:
    name: Build macOS x86
    runs-on: macos-15-intel
    steps:
    - name: Set archive name (branch)
      if: startsWith(github.ref, 'refs/heads/')
      shell: bash
      run: |
        echo "ARCHIVE_NAME=anylink-macOS-amd64.dmg" >> $GITHUB_ENV

    - name: Set archive name (tag)
      if: startsWith(github.ref, 'refs/tags/')
      shell: bash
      run: |
        echo "ARCHIVE_NAME=anylink-${{ github.ref_name }}-macOS-amd64.dmg" >> $GITHUB_ENV

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        arch: clang_64
        version: 6.9.1
        modules: 'qtwebsockets'
        install-deps: false
        cache: false
        cache-key-prefix: 'cache-qt-macos-x86'
        extra: '--base https://mirrors.ocf.berkeley.edu/qt'

    - uses: actions/checkout@v3
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Build
      shell: bash
      run: |
        qmake
        make -j $(sysctl -n hw.logicalcpu)

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: 'stable'

    - name: Build sslcon from source
      uses: actions/checkout@v4
      with:
        repository: tlslink/sslcon
        ref: main
        submodules: recursive
        path: sslcon-src

    - name: Compile sslcon
      working-directory: sslcon-src
      shell: bash
      run: |
        go build -trimpath -ldflags "-s -w" -o vpnagent vpnagent.go
        go build -trimpath -ldflags "-s -w" -o sslcon sslcon.go

    - name: Build archive
      shell: bash
      run: |
        mkdir archive
        cd installer
        curl -k -O -L https://mirrors.ustc.edu.cn/qtproject/archive/qt-installer-framework/4.6.1/QtInstallerFramework-macOS-x64-4.6.1.dmg
        hdiutil attach ./QtInstallerFramework-macOS-x64-4.6.1.dmg
        /Volumes/QtInstallerFramework-macOS-x64-4.6.1/QtInstallerFramework-macOS-x64-4.6.1.app/Contents/MacOS/QtInstallerFramework-macOS-x64-4.6.1 --al --da -c -t `pwd`/ifw in
        cd ../out/bin
        cp ${{ github.workspace }}/sslcon-src/vpnagent ${{ github.workspace }}/sslcon-src/sslcon AnyLink.app/Contents/MacOS
        macdeployqt AnyLink.app
        mkdir -p ../../installer/packages/root/data
        ../../installer/ifw/bin/archivegen ../../installer/packages/root/data/anylink.7z ./AnyLink.app
        cd ../../installer
        ./ifw/bin/binarycreator --offline-only -c config/config.xml -p packages anylink-installer
        hdiutil create -fs HFS+ -srcfolder anylink-installer.app -format UDZO "${{ github.workspace }}"/archive/${{ env.ARCHIVE_NAME }}

    - if: startsWith(github.ref, 'refs/heads/')
      name: Continuous release
      uses: softprops/action-gh-release@v1
      with:
        name: Continuous release
        files: archive/${{ env.ARCHIVE_NAME }}
        tag_name: latest

    - if: startsWith(github.ref, 'refs/tags/')
      name: Tagged release
      uses: softprops/action-gh-release@v1
      with:
        name: Release build (${{ github.ref_name }})
        files: archive/${{ env.ARCHIVE_NAME }}
